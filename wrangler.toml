$schema = "./node_modules/wrangler/config-schema.json"
name = "camlc-dev"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-03-07"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[[routes]]
pattern = "camlc.dev"
custom_domain = true

[[routes]]
pattern = "www.camlc.dev"
custom_domain = true
